<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Taller</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
</head>

<body>
    <div id="app">
        <!-- Main Application Shell -->
        <header class="app-header">
            <div class="header-content">
                <a href="#/" class="back-btn" id="header-back-btn" style="display: none;">◀ <span
                        class="back-text">Atrás</span></a>
                <h1>CRM Taller</h1>
            </div>
        </header>

        <!-- Breadcrumb area -->
        <nav id="breadcrumb-area" class="breadcrumb" style="display: none;"></nav>

        <main id="main-content" class="app-content">
            <!-- Main list views -->
            <div id="view-clients" class="view active">
                <div class="view-header">
                    <h2>Clientes</h2>
                    <button id="btn-add-client" class="primary-btn">➕ Nuevo Cliente</button>
                </div>
                <div id="clients-list" class="list-container">
                    <p>Cargando clientes...</p>
                </div>
            </div>
            <div id="view-jobs" class="view" style="display: none;">
                <div class="view-header">
                    <h2>Órdenes de Trabajo</h2>
                </div>
                <div id="jobs-list" class="list-container">
                    <p>Cargando órdenes...</p>
                </div>
            </div>

            <!-- Drill-down views -->
            <div id="view-client-detail" class="view" style="display: none;">
                <div class="view-header">
                    <h2 id="client-detail-name">Cliente</h2>
                    <div class="actions">
                        <button id="btn-edit-client" class="secondary-btn">✏️ Editar</button>
                    </div>
                </div>
                <div class="client-info card">
                    <p><strong>Teléfono:</strong> <span id="client-detail-phone"></span></p>
                    <p><strong>Email:</strong> <span id="client-detail-email"></span></p>
                </div>
                <div class="section-title">
                    <h3>Equipos del Cliente</h3>
                    <button id="btn-add-equipment" class="primary-btn small">➕ Agregar</button>
                </div>
                <div id="client-equipment-list" class="list-container"></div>
            </div>

            <div id="view-equipment-detail" class="view" style="display: none;">
                <div class="view-header">
                    <h2 id="equipment-detail-name">Equipo</h2>
                </div>
                <div class="equipment-info card">
                    <p><strong>Tipo:</strong> <span id="equipment-detail-type"></span></p>
                    <p><strong>Marca:</strong> <span id="equipment-detail-brand"></span></p>
                </div>
                <div class="section-title">
                    <h3>Items</h3>
                    <button id="btn-add-item" class="primary-btn small">➕ Agregar</button>
                </div>
                <div id="equipment-items-list" class="list-container"></div>
            </div>

            <div id="view-item-detail" class="view" style="display: none;">
                <div class="view-header">
                    <h2 id="item-detail-name">Item</h2>
                </div>

                <!-- Accordion sections (collapsible) -->
                <div class="accordion">
                    <div class="accordion-item" id="section-item-tech">
                        <button class="accordion-header" aria-expanded="true">📋 Datos técnicos <span
                                class="icon">🔽</span></button>
                        <div class="accordion-content">
                            <div class="item-info card">
                                <p><strong>Marca:</strong> <span id="item-detail-brand"></span></p>
                                <p><strong>Condición:</strong> <span id="item-detail-condition"></span></p>
                                <p><strong>Potencia:</strong> <span id="item-detail-power"></span></p>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item" id="section-item-photos">
                        <button class="accordion-header" aria-expanded="false">📸 Fotos <span
                                class="icon">▶️</span></button>
                        <div class="accordion-content" style="display: none;">
                            <button id="btn-add-photo" class="secondary-btn">➕ Subir Foto</button>
                            <div id="item-photos-list" class="photos-grid"></div>
                        </div>
                    </div>

                    <div class="accordion-item" id="section-item-jobs">
                        <button class="accordion-header" aria-expanded="false">🛠 Trabajos <span
                                class="icon">▶️</span></button>
                        <div class="accordion-content" style="display: none;">
                            <button id="btn-add-job" class="secondary-btn">➕ Registrar Trabajo</button>
                            <div id="item-jobs-list" class="list-container"></div>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Bottom Tab Navigation -->
        <nav class="bottom-nav">
            <a href="#/clients" id="nav-clients" class="nav-btn active">👥 Clientes</a>
            <a href="#/jobs" id="nav-jobs" class="nav-btn">🛠 Órdenes</a>
        </nav>
    </div>

    <!-- Scripts (ES Modules) -->
    <script type="module" src="/js/app.js"></script>
</body>

</html>
